app:
  name: feed-flow
  env: local
  port: 8080

mysql:
  dsn: "root:password@tcp(127.0.0.1:3306)/feed_flow?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 20
  max_idle_conns: 10

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  secret: "replace-with-your-own-secret"
  expire_hours: 72

feed:
  hybrid:
    # <= threshold ==> push_and_pull; > threshold => pull_only.
    # keep 0 to fully fallback to pull v1.
    push_follower_threshold: 100
    mix:
      # push candidate quota per page, represented as numerator/denominator.
      push_ratio_numerator: 2
      push_ratio_denominator: 3
      # reserve at least N pull items when pull candidates exist.
      min_pull_items: 1
      # avoid more than N consecutive posts from the same author when alternatives exist.
      max_consecutive_author: 2
      # avoid recently shown authors in the latest K visible picks when alternatives exist.
      author_cooldown_window: 2
      # avoid more than N consecutive picks from the same source (inbox/pull) when both exist.
      max_consecutive_source: 2
  inbox:
    enabled: true
    max_items: 1000
    batch_size: 200
    workers: 8
  outbox:
    enabled: false
    max_items: 1000
    read_chunk_size: 32
    max_authors_per_read: 200
    db_fallback_enabled: true
  exposure:
    enabled: true
    # Posts exposed within this window are filtered on subsequent feed reads.
    window_hours: 24
    # Cleanup TTL for inactive users' exposure history.
    key_ttl_hours: 48
    # Over-fetch multiplier for exposure backfill.
    batch_multiplier: 3
  worker:
    # XAUTOCLAIM min idle seconds before reclaiming pending from other consumers.
    reclaim_min_idle_seconds: 30
    # Idle "waiting stream" log interval.
    idle_log_interval_seconds: 30
    # Max reclaim batches per consume loop.
    reclaim_batch_per_loop: 5

    # Feed event outbox relay settings.
    outbox_relay_batch_size: 50
    outbox_relay_idle_sleep_ms: 1000
    outbox_relay_initial_backoff_ms: 1000
    outbox_relay_max_backoff_ms: 30000

    # Consume retry backoff settings.
    retry_initial_backoff_ms: 1000
    retry_max_backoff_ms: 30000
    # +/- jitter percentage for each retry sleep.
    retry_jitter_percent: 20
    # Max handler failures before moving stream message to DLQ.
    retry_max_attempts: 5
    # TTL for per-stream retry counters.
    retry_counter_ttl_seconds: 86400
    # DLQ stream key for retry-exhausted events.
    dlq_stream_key: "feed:invalidation:dlq"
