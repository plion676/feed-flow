services:
  mysql:
    image: mysql:8
    container_name: feed-flow-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: feed_flow
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - feed-flow-mysql-data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: feed-flow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    volumes:
      - feed-flow-redis-data:/data

volumes:
  feed-flow-mysql-data:
  feed-flow-redis-data:
